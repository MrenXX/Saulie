# Use all CPU cores available to nginx (fine for local)
worker_processes auto;

events {
  # Max simultaneous connections per worker
  worker_connections 1024;
}

http {
  # -------- Logging (so you can *see* what backend got chosen) --------

  # Log includes which upstream answered ($upstream_addr)
  log_format main '$remote_addr [$time_local] "$request" $status '
                  'rt=$request_time urt=$upstream_response_time '
                  'up=$upstream_addr';

  access_log /var/log/nginx/access.log main;

  # -------- Rate limiting + connection limiting --------

  # "zone=...:10m" = reserve 10 megabytes of RAM for tracking counters
  # Key = the Authorization header (lets you simulate "users" locally)
  # rate=10r/m = 10 requests per minute per distinct Authorization value
  limit_req_zone $http_authorization zone=auth_rate:10m rate=10r/m;

  # Track concurrent connections per Authorization value (great for streaming)
  limit_conn_zone $http_authorization zone=auth_conn:10m;

  # -------- Simple Bearer-token auth (checked at Nginx) --------

  # Map Authorization header -> 1 if allowed, else 0
  map $http_authorization $auth_ok {
    default 0;
    "Bearer secret" 1;
  }

  # -------- Upstream backends (this is where "load balancing" happens) --------

  upstream agent_backend {
    # Choose the backend with the fewest active connections (good for streaming)
    least_conn;

    # Backend (agent API on host)
    server host.docker.internal:9000;

    # Keep idle connections open to backends (small perf win)
    keepalive 16;
  }

  # -------- Common proxy settings for your API route --------
  # (We put these in a "named" block via include-style patterns, but keeping simple: inline)

  # =========================
  # HTTP server (8080)
  # =========================
  server {
    # Listen on HTTP port 8080
    listen 8080;

    # Optional: quick health check passthrough
    location = /health {
      # Forward to the upstream group
      proxy_pass http://agent_backend;
    }

    location = /v1/chat/completions {
      # --- Auth gate ---
      # If auth token is wrong/missing -> 401
      if ($auth_ok = 0) { return 401; }

      # --- Rate limit ---
      # burst=5 means allow short spikes of 5 over the limit
      # nodelay means don't "slow them down", just allow burst then 429
      limit_req zone=auth_rate burst=5 nodelay;

      # --- Connection limit (important for streaming) ---
      # Max 2 simultaneous open connections per Authorization token
      limit_conn auth_conn 2;

      # --- Proxy basics ---
      proxy_http_version 1.1;
      proxy_set_header Host $host;

      # Helpful debug header: tells you which backend handled it
      add_header X-Upstream $upstream_addr always;

      # --- Streaming (SSE) friendliness ---
      # Don't buffer responses; forward tokens immediately
      proxy_buffering off;

      # Disable gzip for streaming (keeps chunking simple)
      gzip off;

      # Long timeouts so streaming doesn't get cut off
      proxy_read_timeout 3600s;
      proxy_send_timeout 3600s;

      # Send request to the upstream group
      proxy_pass http://agent_backend;
    }
  }
}